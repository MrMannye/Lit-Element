/* =====================================================================
   MINI RUNTIME COMPATIBLE CON LA API DE LitElement
   ---------------------------------------------------------------------
   El curso trata sobre Lit, así que este portal está construido con
   Custom Elements + Shadow DOM + un ciclo de vida "reactive properties
   → render()" que replica la forma de trabajar de LitElement. Para que
   el artifact funcione sin depender de un CDN externo, esta es una
   micro-implementación propia de LitElement/html/css (no la librería
   oficial "lit" de npm), pero el patrón de componente es el mismo que
   verás en los módulos del curso.
===================================================================== */
class LitElement extends HTMLElement {
  static properties = {};
  static styles = '';

  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._reactiveValues = {};
    const props = this.constructor.properties || {};
    for (const key of Object.keys(props)) {
      const def = props[key] || {};
      let initial = 'default' in def ? def.default
        : def.type === Boolean ? false
        : def.type === Array ? []
        : def.type === Object ? {}
        : '';
      this._reactiveValues[key] = initial;
      Object.defineProperty(this, key, {
        get: () => this._reactiveValues[key],
        set: (v) => {
          const old = this._reactiveValues[key];
          if (old === v) return;
          this._reactiveValues[key] = v;
          this.requestUpdate();
        },
      });
    }
  }

  connectedCallback() {
    this._scheduleRender();
  }

  requestUpdate() {
    this._scheduleRender();
  }

  _scheduleRender() {
    if (this._pending) return;
    this._pending = true;
    queueMicrotask(() => {
      this._pending = false;
      this._doRender();
    });
  }

  _doRender() {
    const styles = this.constructor.styles ? `<style>${this.constructor.styles}</style>` : '';
    const content = this.render ? this.render() : '';
    this.shadowRoot.innerHTML = styles + content;
    this._bindActions();
    if (this.firstUpdated && !this._firstUpdateDone) {
      this._firstUpdateDone = true;
      this.firstUpdated();
    }
    if (this.updated) this.updated();
  }

  // Delega eventos declarados como data-on-click="metodo" y data-on-input="campo"
  _bindActions() {
    this.shadowRoot.querySelectorAll('[data-on-click]').forEach((el) => {
      el.addEventListener('click', (e) => {
        const method = el.getAttribute('data-on-click');
        this[method] && this[method](e);
      });
    });
    this.shadowRoot.querySelectorAll('[data-on-input]').forEach((el) => {
      el.addEventListener('input', (e) => {
        const field = el.getAttribute('data-on-input');
        this[field] = el.type === 'checkbox' ? e.target.checked : e.target.value;
      });
    });
  }

  emit(name, detail) {
    this.dispatchEvent(new CustomEvent(name, { detail, bubbles: true, composed: true }));
  }
}

const html = (strings, ...values) =>

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

/* ---------------------------------------------------------------------
   Ícono ns — glifos genéricos simples, sin dependencias externas
--------------------------------------------------------------------- */
function icon(name, size = 16, color = 'currentColor') {
  const base = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"`;
  const paths = {
    check: `<polyline points="20 6 9 17 4 12"></polyline>`,
    circle: `<circle cx="12" cy="12" r="9"></circle>`,
    checkCircle: `<circle cx="12" cy="12" r="9"></circle><polyline points="8 12 11 15 16 9"></polyline>`,
    copy: `<rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>`,
    send: `<polygon points="21 3 14 21 10 14 3 10 21 3"></polygon>`,
    loader: `<circle cx="12" cy="12" r="9" stroke-opacity="0.25"></circle><path d="M21 12a9 9 0 0 0-9-9"></path>`,
    terminal: `<polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>`,
    list: `<line x1="9" y1="6" x2="20" y2="6"></line><line x1="9" y1="12" x2="20" y2="12"></line><line x1="9" y1="18" x2="20" y2="18"></line><circle cx="4.5" cy="6" r="1"></circle><circle cx="4.5" cy="12" r="1"></circle><circle cx="4.5" cy="18" r="1"></circle>`,
    refresh: `<polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>`,
    wand: `<path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8 19 13M17.8 6.2 19 5M3 21l9-9M12.2 6.2 11 5"></path>`,
    x: `<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>`,
    sparkles: `<path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2 2M16 16l2 2M6 18l2-2M16 8l2-2"></path>`,
  };
  return `<svg ${base}${name === 'loader' ? ' class="spin"' : ''}>${paths[name] || ''}</svg>`;
}

/* =====================================================================
   <bbva-lab-checklist>
===================================================================== */
class BbvaLabChecklist extends LitElement {
  static properties = { items: { type: Array, default: [] }, checked: { type: Array, default: [] } };
  static styles = css`
    :host{ display:block; }
    .item{ display:flex; align-items:flex-start; gap:10px; padding:6px 0; cursor:pointer; font-size:13.5px; }
    .item svg{ flex-shrink:0; margin-top:2px; }
    .done{ color: var(--gray); text-decoration: line-through; }
    .pending{ color: var(--ink); }
  `;
  render() {
    return html`
      ${this.items.map((item, i) => html`
        <div class="item" data-idx="${i}">
          ${this.checked[i] ? icon('checkCircle', 18, '#14549C') : icon('circle', 18, '#5A6B7B')}
          <span class="${this.checked[i] ? 'done' : 'pending'}">${escapeHtml(item)}</span>
        </div>
      `).join('')}
    `;
  }
  _bindActions() {
    super._bindActions();
    this.shadowRoot.querySelectorAll('[data-idx]').forEach((el) => {
      el.addEventListener('click', () => this.emit('toggle', { idx: Number(el.getAttribute('data-idx')) }));
    });
  }
}
customElements.define('bbva-lab-checklist', BbvaLabChecklist);

  _bindActions() {

    this.shadowRoot.querySelectorAll('[data-mid]').forEach((el) => {

          <button class="trybtn" data-on-click="_try">${icon('wand', 13)} Probarlo en el Playground</button>
        ` : ''}
      </div>
    `;
  }
  updated() {
    const list = this.shadowRoot.getElementById('checklist');
    if (list && this.module) {
      list.items = this.module.checklist;
      list.checked = this.checked;
      list.onclick = null;
      list.removeEventListener('toggle', this._onToggle);
      this._onToggle = (e) => this.emit('toggle-check', { idx: e.detail.idx });
      list.addEventListener('toggle', this._onToggle);
    }
  }
  _copy() {
    const text = this.module.promptTemplate;
    this._copyText(text);
    this.copied = true;
    setTimeout(() => { this.copied = false; }, 1500);
  }
  _copyText(text) {
    try {
      navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (err) {}
      document.body.removeChild(ta);
    }
  }
  _try() {
    const parts = this.module.promptTemplate.split('\n\n---\n\n');
    if (parts.length === 2) {
      this.emit('try-playground', { system: parts[0], user: parts[1] });
    } else {
      this.emit('try-playground', { system: '', user: this.module.promptTemplate });
    }
  }
}
customElements.define('bbva-module-detail', BbvaModuleDetail);

/* =====================================================================
   <bbva-prompt-playground>
===================================================================== */
class BbvaPromptPlayground extends LitElement {
  static properties = {
    loading: { type: Boolean, default: false },
    response: { type: Array, default: null },
    error: { type: String, default: '' },
  };
  static styles = css`
    :host{ display:block; flex:1; overflow-y:auto; padding:32px; }
    .wrap{ max-width:720px; margin:0 auto; }
    .kicker{ font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--core); margin-bottom:8px; }
    h1{ font-size:24px; font-weight:800; color:var(--navy); margin:0 0 8px 0; }
    .desc{ font-size:14px; color:var(--gray); margin:0 0 20px 0; line-height:1.55; }
    label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--core-2); display:block; margin-bottom:6px; }
    textarea{ width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; font-size:13px; font-family: 'Courier New', monospace; resize: vertical; }
    .field{ margin-bottom:16px; }
    .row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
    .toolcheck{ font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:8px; }
    button.run{ background:var(--core); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:8px; cursor:pointer; }
    button.run:disabled{ opacity:0.6; cursor:default; }
    .err{ background:#FDECEC; color:#8A1F1F; border-radius:8px; padding:14px; font-size:13.5px; margin-bottom:16px; display:flex; gap:8px; }
    .resp{ background:var(--navy); border-radius:10px; padding:20px; }
    .resplabel{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--aqua); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .resp p{ color:#EAF2FB; font-size:13.5px; line-height:1.6; white-space:pre-wrap; margin:0 0 12px 0; }
    .toolcall{ margin-bottom:12px; }
    .toollabel{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--aqua); margin-bottom:6px; }
    pre.toolbody{ background:rgba(255,255,255,0.07); border-radius:6px; padding:10px; color:#E8F0FA; font-size:12px; font-family:'Courier New',monospace; white-space:pre-wrap; margin:0; }
    .empty{ border:1.5px dashed var(--line); border-radius:10px; padding:32px; text-align:center; font-size:13.5px; color:var(--gray); }
  `;
  constructor() {
    super();
    this._sys = 'Eres un ingeniero senior de Frontend en BBVA, experto en Lit y en la arquitectura Cells.';
    this._user = 'Genera el componente "bbva-badge" con una propiedad "status" (success/warning/error).';
    this._useTool = false;
  }
  setPrompts(system, user) {
    this._sys = system || this._sys;
    this._user = user || this._user;
    this.response = null;
    this.error = '';
    this.requestUpdate();
  }
  render() {
    return html`
      <div class="wrap">
        <div class="kicker">Prompt Playground</div>
        <h1>Practica prompts contra Claude en vivo</h1>
        <p class="desc">Escribe un system prompt y una instrucción, tal como lo harías con el agente de los Módulos 4-8, y observa la respuesta real del modelo. Activa "Function Calling" para ver cómo Claude decide invocar una herramienta en vez de solo responder texto (Módulo 2).</p>

        <div class="field">
          <label>System prompt (rol + convenciones)</label>
          <textarea rows="3" id="sysbox" data-on-input="_sys">${escapeHtml(this._sys)}</textarea>
        </div>
        <div class="field">
          <label>User prompt (la tarea)</label>
          <textarea rows="4" id="userbox" data-on-input="_user">${escapeHtml(this._user)}</textarea>
        </div>

        <div class="row">
          <label class="toolcheck" style="margin:0;">
            <input type="checkbox" id="toolcheck" ${this._useTool ? 'checked' : ''} />
            Incluir herramienta <code style="color:var(--core);">createLitComponent</code> (Function Calling)
          </label>
          <button class="run" data-on-click="_run" ${this.loading ? 'disabled' : ''}>
            ${icon(this.loading ? 'loader' : 'send', 16, '#fff')} ${this.loading ? 'Enviando...' : 'Ejecutar'}
          </button>
        </div>

        ${this.error ? html`<div class="err">${icon('x', 16)} ${escapeHtml(this.error)}</div>` : ''}

        ${this.response ? html`
          <div class="resp">
            <div class="resplabel">${icon('sparkles', 13, '#2DCCCD')} Respuesta de Claude</div>
            ${this.response.length === 0 ? '<p>(Respuesta vacía)</p>' : this.response.map((block) => {
              if (block.type === 'text') return `<p>${escapeHtml(block.text)}</p>`;
              if (block.type === 'tool_use') return `
                <div class="toolcall">
                  <div class="toollabel">tool_call → ${escapeHtml(block.name)}</div>
                  <pre class="toolbody">${escapeHtml(JSON.stringify(block.input, null, 2))}</pre>
                </div>`;
              return '';
            }).join('')}
          </div>
        ` : !this.error && !this.loading ? html`
          <div class="empty">Escribe tu prompt y pulsa "Ejecutar" para ver la respuesta aquí.</div>
        ` : ''}
      </div>
    `;
  }
  _bindActions() {
    super._bindActions();
    const cb = this.shadowRoot.getElementById('toolcheck');
    if (cb) cb.addEventListener('change', (e) => { this._useTool = e.target.checked; });
    // Restaurar foco/cursor: no re-renderizamos en cada tecleo (ver data-on-input),
    // así que no hace falta reposicionar el cursor aquí.
  }
  async _run() {
    const sysEl = this.shadowRoot.getElementById('sysbox');
    const userEl = this.shadowRoot.getElementById('userbox');
    const sys = sysEl ? sysEl.value : this._sys;
    const user = userEl ? userEl.value : this._user;
    this._sys = sys;
    this._user = user;
    this.loading = true;
    this.error = '';
    this.response = null;
    try {
      const body = {
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: sys,
        messages: [{ role: 'user', content: user }],
      };
      if (this._useTool) body.tools = [TOOL_DEF];
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data && data.error) {
        this.error = data.error.message || 'Error desconocido de la API';
      } else {
        this.response = data.content || [];
      }
    } catch (e) {
      this.error = 'No se pudo conectar con la API. Intenta de nuevo.';
    } finally {
      this.loading = false;
    }
  }
}
customElements.define('bbva-prompt-playground', BbvaPromptPlayground);

/* =====================================================================
   <bbva-practice-app>  (root)
===================================================================== */
class BbvaPracticeApp extends LitElement {
  static properties = {
    view: { type: String, default: 'modules' },
    selected: { type: String, default: 'm1' },
    progress: { type: Object, default: {} },
    ready: { type: Boolean, default: false },
  };
  static styles = css`
    :host{ display:flex; flex-direction:column; min-height:100vh; }
    header{ background:var(--navy); color:#fff; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; }
    .brand-sm{ font-size:13px; font-weight:700; letter-spacing:0.3px; }
    .brand-lg{ font-size:17px; font-weight:800; margin-top:2px; }
    .right{ display:flex; align-items:center; gap:14px; }
    .tabs{ display:flex; background:rgba(255,255,255,0.1); border-radius:8px; padding:4px; }
    .tab{ padding:7px 12px; border-radius:6px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; cursor:pointer; border:none; background:transparent; color:#EAF2FB; }
    .tab.active{ background:var(--aqua); color:var(--navy); }
    .progresstext{ text-align:right; }
    .progresstext .l{ font-size:9.5px; text-transform:uppercase; letter-spacing:1px; opacity:0.7; }
    .progresstext .v{ font-size:13px; font-weight:700; color:var(--aqua); }
    .bar{ width:96px; height:8px; border-radius:8px; background:rgba(255,255,255,0.15); overflow:hidden; }
    .bar > div{ height:100%; background:var(--aqua); border-radius:8px; }
    main{ flex:1; display:flex; overflow:hidden; }
    footer{ padding:10px 24px; font-size:10.5px; color:var(--gray); border-top:1px solid var(--line); background:#fff; display:flex; justify-content:space-between; }
  `;
  connectedCallback() {
    super.connectedCallback();
    this._loadProgress();
  }
  async _loadProgress() {
    const next = {};
    for (const m of MODULES) {
      try {
        const r = await window.storage.get(`progress_${m.id}`);
        next[m.id] = r ? JSON.parse(r.value) : m.checklist.map(() => false);
      } catch (e) {
        next[m.id] = m.checklist.map(() => false);
      }
    }
    this.progress = next;
    this.ready = true;
  }
  _doneMap() {
    const map = {};
    for (const m of MODULES) {
      const arr = this.progress[m.id];
      map[m.id] = !!(arr && arr.length > 0 && arr.every(Boolean));
    }
    return map;
  }
  render() {
    const doneMap = this._doneMap();
    const completed = Object.values(doneMap).filter(Boolean).length;
    const pct = Math.round((completed / TOTAL) * 100);
    return html`
      <header>
        <div>
          <div class="brand-sm">BBVA<span style="color:var(--aqua);">·</span>AI Engineering</div>
          <div class="brand-lg">Portal de Práctica · AI Cells Software Engineer</div>
        </div>
        <div class="right">
          <div class="tabs">
            <button class="tab ${this.view === 'modules' ? 'active' : ''}" data-on-click="_showModules">${icon('list', 14)} Ejercicios</button>
            <button class="tab ${this.view === 'playground' ? 'active' : ''}" data-on-click="_showPlayground">${icon('terminal', 14)} Prompt Playground</button>
          </div>
          <div class="progresstext">
            <div class="l">Progreso</div>
            <div class="v">${completed} / ${TOTAL} módulos</div>
          </div>
          <div class="bar"><div style="width:${pct}%;"></div></div>
        </div>
      </header>
      <main id="main"></main>
      <footer>
        <span>Material del facilitador · Uso interno BBVA</span>
        <span>Building AI Agents for SWE — Lit &amp; Cells</span>
      </footer>
    `;
  }
  updated() {
    const main = this.shadowRoot.getElementById('main');
    if (!main) return;
    main.style.display = 'flex';
    main.style.width = '100%';
    main.style.overflow = 'hidden';

    if (this.view === 'modules') {
      if (!this._sidebarEl) {
        main.innerHTML = '';
        this._sidebarEl = document.createElement('bbva-module-sidebar');
        this._detailEl = document.createElement('bbva-module-detail');
        this._sidebarEl.addEventListener('select', (e) => { this.selected = e.detail.id; });
        this._sidebarEl.addEventListener('reset', () => this._resetProgress());
        this._detailEl.addEventListener('toggle-check', (e) => this._toggleCheck(e.detail.idx));
        this._detailEl.addEventListener('try-playground', (e) => this._tryInPlayground(e.detail));
        main.appendChild(this._sidebarEl);
        main.appendChild(this._detailEl);
      } else if (!main.contains(this._sidebarEl)) {
        main.innerHTML = '';
        main.appendChild(this._sidebarEl);
        main.appendChild(this._detailEl);
      }
      this._sidebarEl.selected = this.selected;
      this._sidebarEl.doneMap = doneMapCache(this);
      const mod = MODULES.find((m) => m.id === this.selected);
      this._detailEl.module = mod;
      this._detailEl.checked = this.progress[this.selected] || [];
    } else {
      if (!this._pgEl) {
        this._pgEl = document.createElement('bbva-prompt-playground');
      }
      if (!main.contains(this._pgEl)) {
        main.innerHTML = '';
        main.appendChild(this._pgEl);
      }
    }
  }
  _showModules() { this.view = 'modules'; }
  _showPlayground() { this.view = 'playground'; }
  _toggleCheck(idx) {
    const arr = (this.progress[this.selected] || []).slice();
    arr[idx] = !arr[idx];
    const next = { ...this.progress, [this.selected]: arr };
    this.progress = next;
    window.storage.set(`progress_${this.selected}`, JSON.stringify(arr)).catch(() => {});
  }
  async _resetProgress() {
    const next = {};
    for (const m of MODULES) {
      const empty = m.checklist.map(() => false);
      next[m.id] = empty;
      try { await window.storage.set(`progress_${m.id}`, JSON.stringify(empty)); } catch (e) {}
    }
    this.progress = next;
  }
  _tryInPlayground(detail) {
    this.view = 'playground';
    requestAnimationFrame(() => {
      if (this._pgEl) this._pgEl.setPrompts(detail.system, detail.user);
    });
  }
}
function doneMapCache(app) {
  const map = {};
  for (const m of MODULES) {
    const arr = app.progress[m.id];
    map[m.id] = !!(arr && arr.length > 0 && arr.every(Boolean));
  }
  return map;
}
customElements.define('bbva-practice-app', BbvaPracticeApp);
</script>
